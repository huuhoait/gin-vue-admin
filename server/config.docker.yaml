# github.com/huuhoait/gin-vue-admin/server Global Configuration

# jwt configuration
jwt:
    signing-key: qmPlus
    expires-time: 7d
    buffer-time: 1d
    issuer: qmPlus
# zap logger configuration
zap:
    level: info
    format: console
    prefix: "[github.com/huuhoait/gin-vue-admin/server]"
    director: log
    show-line: true
    encode-level: LowercaseColorLevelEncoder
    stacktrace-key: stacktrace
    log-in-console: true
    retention-day: -1

# redis configuration
redis:
    # Whether to use redis cluster mode
    useCluster: false
    # When cluster mode is enabled, addr and db are ignored
    addr: 177.7.0.14:6379
    password: ""
    db: 0
    clusterAddrs:
        - "177.7.0.14:7000"
        - "177.7.0.15:7001"
        - "177.7.0.13:7002"

# redis-list configuration
redis-list:
    - name: cache           # Database name. Note: name must be unique in redis-list
      useCluster: false     # Whether to use redis cluster mode
      addr: 177.7.0.14:6379  # When cluster mode is enabled, addr and db are ignored
      password: ""
      db: 0
      clusterAddrs:
          - "177.7.0.14:7000"
          - "177.7.0.15:7001"
          - "177.7.0.13:7002"

# mongo configuration
mongo:
    coll: ''
    options: ''
    database: ''
    username: ''
    password: ''
    auth-source: ''
    min-pool-size: 0
    max-pool-size: 100
    socket-timeout-ms: 0
    connect-timeout-ms: 0
    is-zap: false
    hosts:
        - host: ''
          port: ''

# email configuration
email:
    to: xxx@qq.com
    port: 465
    from: xxx@163.com
    host: smtp.163.com
    is-ssl: true
    secret: xxx
    nickname: test

# system configuration
system:
    env: local # Change to public to disable router log output
    addr: 8888
    db-type: mysql
    oss-type: local # Controls whether OSS uses local storage or Qiniu etc. Add more OSS providers by configuring NewOss in server/utils/upload/upload.go
    use-redis: false # Use redis
    use-mongo: false     # Use mongo
    use-multipoint: false
    # IP rate limit count: 15000 times per hour
    iplimit-count: 15000
    #  IP rate limit window: one hour
    iplimit-time: 3600
    #  Global router prefix
    router-prefix: ""
    #  Strict role mode. When enabled, roles form a parent/child hierarchy
    use-strict-auth: false

# captcha configuration
captcha:
    key-long: 6
    img-width: 240
    img-height: 80
    open-captcha: 0 # 0 means always on; greater than 0 sets a failure threshold
    open-captcha-timeout: 3600 # Only takes effect when open-captcha is greater than 0

# mysql connect configuration
# Do not modify database info manually before initialization!!! If manual initialization is required see (https://gin-vue-admin.com/docs/first_master)
mysql:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false

# pgsql connect configuration
# Do not modify database info manually before initialization!!! If manual initialization is required see (https://gin-vue-admin.com/docs/first_master)
pgsql:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false
oracle:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false
mssql:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false
sqlite:
    path: ""
    port: ""
    config: ""
    db-name: ""
    username: ""
    password: ""
    max-idle-conns: 10
    max-open-conns: 100
    log-mode: ""
    log-zap: false
db-list:
    - disable: true # Whether to disable
      type: "" # Database type; currently supports mysql, pgsql, mssql, oracle
      alias-name: "" # Database name. Note: alias-name must be unique in db-list
      path: ""
      port: ""
      config: ""
      db-name: ""
      username: ""
      password: ""
      max-idle-conns: 10
      max-open-conns: 100
      log-mode: ""
      log-zap: false

# local configuration
local:
    path: uploads/file
    store-path: uploads/file

# autocode configuration
autocode:
    web: web/src
    root: "" # root is auto-detected on project load. Do not configure manually
    server: server
    module: 'github.com/huuhoait/gin-vue-admin/server'
    ai-path: ""  # AI service path

# qiniu configuration (Apply for the corresponding access key, secret key, bucket, and domain from Qiniu)
qiniu:
    zone: ZoneHuaDong
    bucket: ""
    img-path: ""
    use-https: false
    access-key: ""
    secret-key: ""
    use-cdn-domains: false

# minio oss configuration
minio:
    endpoint: yourEndpoint
    access-key-id: yourAccessKeyId
    access-key-secret: yourAccessKeySecret
    bucket-name: yourBucketName
    use-ssl: false
    base-path: ""
    bucket-url: "http://host:9000/yourBucketName"

# aliyun oss configuration
aliyun-oss:
    endpoint: yourEndpoint
    access-key-id: yourAccessKeyId
    access-key-secret: yourAccessKeySecret
    bucket-name: yourBucketName
    bucket-url: yourBucketUrl
    base-path: yourBasePath

# tencent cos configuration
tencent-cos:
    bucket: xxxxx-10005608
    region: ap-shanghai
    secret-id: your-secret-id
    secret-key: your-secret-key
    base-url: https://gin.vue.admin
    path-prefix: github.com/huuhoait/gin-vue-admin/server

# aws s3 configuration (minio compatible)
aws-s3:
    bucket: xxxxx-10005608
    region: ap-shanghai
    endpoint: ""
    s3-force-path-style: false
    disable-ssl: false
    secret-id: your-secret-id
    secret-key: your-secret-key
    base-url: https://gin.vue.admin
    path-prefix: github.com/huuhoait/gin-vue-admin/server

# cloudflare r2 configuration
cloudflare-r2:
    bucket: xxxx0bucket
    base-url: https://gin.vue.admin.com
    path: uploads
    account-id: xxx_account_id
    access-key-id: xxx_key_id
    secret-access-key: xxx_secret_key

# huawei obs configuration
hua-wei-obs:
    path: you-path
    bucket: you-bucket
    endpoint: you-endpoint
    access-key: you-access-key
    secret-key: you-secret-key

# excel configuration
excel:
    dir: ./resource/excel/

# disk usage configuration
disk-list:
    - mount-point: "/"

# CORS configuration
# Must be used together with `Router.Use(middleware.CorsByRules())` in server/initialize/router.go
cors:
    mode: strict-whitelist # Modes: allow-all allows everything; whitelist adds CORS headers for whitelisted origins; strict-whitelist rejects any request not in the whitelist
    whitelist:
        - allow-origin: example1.com
          allow-headers: Content-Type,AccessToken,X-CSRF-Token, Authorization, Token,X-Token,X-User-Id
          allow-methods: POST, GET
          expose-headers: Content-Length, Access-Control-Allow-Origin, Access-Control-Allow-Headers, Content-Type

          allow-credentials: true # Boolean
        - allow-origin: example2.com
          allow-headers: content-type
          allow-methods: GET, POST
          expose-headers: Content-Length, Access-Control-Allow-Origin, Access-Control-Allow-Headers, Content-Type
          allow-credentials: true # Boolean
mcp:
    name: GVA_MCP
    version: v1.0.0
    addr: 8889
    separate: false
