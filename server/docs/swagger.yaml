paths:
  /admin-api/v1/agents:
    get:
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by level
        in: query
        name: level
        type: string
      - description: Search keyword
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proxy.GVAEnvelope'
      security:
      - ApiKeyAuth: []
      summary: List agents
      tags:
      - SkyAgent-Agent
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proxy.GVAEnvelope'
      security:
      - ApiKeyAuth: []
      summary: Create a new agent
      tags:
      - SkyAgent-Agent
  /admin-api/v1/agents/{id}:
    get:
      parameters:
      - description: Agent ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/proxy.GVAEnvelope'
      security:
      - ApiKeyAuth: []
      summary: Get agent detail
